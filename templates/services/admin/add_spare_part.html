{% extends "erp/admin/base.html" %}
{% block content %}

<h4>Add Spare Part</h4>

<form method="post">
    {% csrf_token %}
    <input type="text" name="part_name" class="form-control mb-2" placeholder="Part Name" required>
    <input type="text" name="part_number" class="form-control mb-2" placeholder="Part Number">
    <input type="number" name="quantity" class="form-control mb-2" placeholder="Quantity" required>
    <button class="btn btn-primary">Save</button>
</form>

{% endblock %}
