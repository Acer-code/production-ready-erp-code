{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Material Dash</title>

    <!-- plugins:css -->
    <link rel="stylesheet" href="{% static 'assets/vendors/mdi/css/materialdesignicons.min.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="{% static 'assets/vendors/css/vendor.bundle.base.css' %}">
    <!-- endinject -->
    <!-- Plugin css for this page -->
    <link rel="stylesheet" href="{% static 'assets/vendors/flag-icon-css/css/flag-icon.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/vendors/jvectormap/jquery-jvectormap.css' %}">
    <!-- End plugin css for this page -->
    <link rel="stylesheet" href="{% static 'assets/plugins/bootstrap.min.css' %}">
    <script src="{% static 'assets/plugins/bootstrap.bundle.min.js' %}"></script>
    <!-- Layout styles -->
    <link rel="stylesheet" href="{% static 'assets/css/demo/style.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/main.css' %}">
    <!-- End layout styles -->
    <link rel="shortcut icon" href="{% static 'assets/images/favicon-.png' %}" />
</head>

<body>
    <script src="{% static 'assets/js/preloader.js' %}"></script>
    <div class="body-wrapper">
        <!-- partial:partials/_sidebar.html -->
       <aside class="mdc-drawer mdc-drawer--dismissible mdc-drawer--open">
            {% include 'erp/admin/side_bar.html'%}
        </aside>
        <!-- partial -->
        <div class="main-wrapper mdc-drawer-app-content">
            <!-- partial:partials/_navbar.html -->
            <header class="mdc-top-app-bar">
                {% include 'erp/admin/top_bar.html' %}
            </header>
            <!-- Error Messages Start -->
                {% include 'messages.html' %}
            <!-- Error Messages End -->
               
            {% block content %}
            {% endblock %}
        </div>

    <!-- plugins:js -->
    <script src="{% static 'assets/vendors/js/vendor.bundle.base.js' %}"></script>
    <!-- endinject -->
    <!-- Plugin js for this page-->
    <script src="{% static 'assets/vendors/chartjs/Chart.min.js' %}"></script>
    <script src="{% static 'assets/vendors/jvectormap/jquery-jvectormap.min.js' %}"></script>
    <script src="{% static 'assets/vendors/jvectormap/jquery-jvectormap-world-mill-en.js' %}"></script>
    <!-- End plugin js for this page-->
    <!-- inject:js -->
    <script src="{% static 'assets/js/material.js' %}"></script>
    <script src="{% static 'assets/js/misc.js' %}"></script>
    <!-- endinject -->
    <!-- Custom js for this page-->
    <script src="{% static 'assets/js/dashboard.js' %}"></script>
    <!-- End custom js for this page-->
</body>

</html>
