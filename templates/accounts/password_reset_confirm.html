{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Material Dash</title>
    <!-- plugins:css -->
    <link rel="stylesheet" href="{% static 'assets/vendors/mdi/css/materialdesignicons.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/vendors/css/vendor.bundle.base.css' %}">
    <!-- endinject -->
    <!-- Plugin css for this page -->
    <!-- End plugin css for this page -->
    <link rel="stylesheet" href="{% static 'assets/plugins/bootstrap.min.css' %}">
    <script src="{% static 'assets/plugins/bootstrap.bundle.min.js' %}"></script>
    <!-- Layout styles -->
    <link rel="stylesheet" href="{% static 'assets/css/demo/style.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/main.css' %}">
    <!-- End layout styles -->
    <link rel="shortcut icon" href="{% static 'assets/images/favicon.png' %}" />
</head>

<body>
    <script src="{% static 'assets/js/preloader.js' %}"></script>
    <div class="body-wrapper">
        <div class="main-wrapper">
            <div class="page-wrapper d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="col-md-5">
    <div class="mdc-card p-4">

      <h4 class="text-center mb-3">Set New Password</h4>

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label>New Password</label>
          <input type="password" name="new_password1" class="form-control" required>
        </div>

        <div class="mb-3">
          <label>Confirm Password</label>
          <input type="password" name="new_password2" class="form-control" required>
        </div>

        <button type="submit" class="mdc-button mdc-button--raised w-100">
          Reset Password
        </button>
      </form>

    </div>
  </div>
</div>
        </div>
    </div>



    <!-- plugins:js -->
    <script src="{% static 'assets/vendors/js/vendor.bundle.base.js' %}"></script>
    <!-- endinject -->
    <!-- Plugin js for this page-->
    <!-- End plugin js for this page-->
    <!-- inject:js -->
    <script src="{% static 'assets/js/material.js' %}"></script>
    <script src="{% static 'assets/js/misc.js' %}"></script>
    <!-- endinject -->
    <!-- Custom js for this page-->
    <!-- End custom js for this page-->
</body>

</html>
